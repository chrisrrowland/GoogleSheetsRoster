<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>

    <script>
      // Tailwind Configuration: Sets Roboto as the default sans font
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Roboto', 'sans-serif'],
            },
          },
        },
      }
    </script>

    <style>
        /* Custom Dark Mode Styling for Grid.js to match Tailwind's gray-900 */
        .gridjs { font-family: 'Roboto', sans-serif !important; }
        .gridjs-wrapper { border-radius: 8px; border: none; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .gridjs-container { padding: 0; background-color: transparent; }
        
        .gridjs-td { background-color: #1f2937; color: #e5e7eb; border: 1px solid #374151; }
        .gridjs-th { background-color: #111827; color: #60a5fa; border: 1px solid #374151; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
        
        .gridjs-search-input { 
            background-color: #374151; 
            color: white; 
            border: 1px solid #4b5563; 
            border-radius: 6px; 
            padding: 10px 15px;
        }
        .gridjs-search-input:focus { border-color: #60a5fa; outline: none; }
        
        .gridjs-footer { background-color: #111827; border: 1px solid #374151; color: #9ca3af; }
        .gridjs-pagination .gridjs-pages button { background-color: #374151; color: white; border: 1px solid #4b5563; }
        .gridjs-pagination .gridjs-pages button:hover { background-color: #4b5563; }
        .gridjs-pagination .gridjs-pages button:disabled { background-color: #1f2937; color: #6b7280; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 id="league-title" class="text-4xl font-bold tracking-tight text-white mb-2 underline decoration-blue-500 decoration-4 underline-offset-8">
                League Rosters
            </h1>
            <div id="status-container" class="mt-4">
                <span id="status" class="inline-block px-3 py-1 rounded-full text-[10px] font-mono uppercase tracking-widest bg-blue-900/30 text-blue-400 border border-blue-800">
                    Connecting to Data Source...
                </span>
            </div>
        </header>

        <div id="table-wrapper"></div>
    </div>

    <script>
        /**
         * 1. INITIALIZE DATA FETCH
         */
        async function init() {
        try {
            const configResponse = await fetch('config.json');
            const config = await configResponse.json();
            
            // Update Title
            document.title = config.leagueName;
            document.getElementById('league-title').innerText = config.leagueName;
    
            Papa.parse(config.sheetTsvUrl, {
                download: true,
                header: true,
                delimiter: "\t",
                skipEmptyLines: true,
                complete: function(results) {
                    // Logic: Only keep rows where "Player" has text
                    const cleanData = results.data.filter(row => row.Player && row.Player.trim() !== "");
                    renderTable(cleanData);
                    document.getElementById('status').innerText = "✓ Data Live";
                }
            });
        } catch (err) {
            document.getElementById('status').innerText = "Error loading config.json";
            console.error("Initialization error:", err);
        }
    }

        /**
         * 2. RENDER THE INTERACTIVE TABLE
         */
        function renderTable(data) {
            new gridjs.Grid({
                columns: [
                    { name: "Player", width: "35%" },
                    { name: "Pos", width: "15%" },
                    { name: "Org", width: "15%" },
                    { name: "Team", width: "35%" }
                ],
                data: data.map(r => [
                    r.Player, 
                    r.Pos, 
                    r.Org, 
                    r.Team
                ]),
                search: true,
                sort: true,
                pagination: { limit: 25 }
            }).render(document.getElementById("table-wrapper"));
        }

        // Boot the app
        init();
    </script>
</body>
</html>
